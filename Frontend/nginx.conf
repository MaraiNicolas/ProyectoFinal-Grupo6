server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: cualquier ruta que no matchee un archivo real
    # devuelve index.html para que React Router maneje el ruteo client-side.
    # Necesario para /auth/sso, /invitaciones, /login, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets versionados (Vite les pone hash en el nombre).
    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}